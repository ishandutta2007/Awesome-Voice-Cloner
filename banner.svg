<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072ff;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" style="stop-color:#00c6ff;stop-opacity:1" />
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="800" height="200" rx="15" fill="url(#grad1)" />
  
  <!-- Sound waves -->
  <g fill="white" opacity="0.3">
    <rect x="50" y="80" width="10" height="40" rx="5" />
    <rect x="70" y="60" width="10" height="80" rx="5" />
    <rect x="90" y="40" width="10" height="120" rx="5" />
    <rect x="110" y="70" width="10" height="60" rx="5" />
    <rect x="130" y="50" width="10" height="100" rx="5" />
    <rect x="150" y="80" width="10" height="40" rx="5" />
  </g>

  <g fill="white" opacity="0.3" transform="translate(600,0)">
    <rect x="0" y="80" width="10" height="40" rx="5" />
    <rect x="20" y="50" width="10" height="100" rx="5" />
    <rect x="40" y="70" width="10" height="60" rx="5" />
    <rect x="60" y="40" width="10" height="120" rx="5" />
    <rect x="80" y="60" width="10" height="80" rx="5" />
    <rect x="100" y="80" width="10" height="40" rx="5" />
  </g>

  <text x="400" y="115" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" filter="url(#shadow)">
    AWESOME VOICE CLONER
  </text>
  <text x="400" y="150" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="white" text-anchor="middle" opacity="0.8">
    The Ultimate AI Voice Cloning Ecosystem
  </text>
</svg>
